# Model configurations for Gemma experiments
# Gemma generation defaults follow the official Hugging Face guidance for google/gemma-3-12b-it.
# 모델 다운로드: python models/download_model.py --model gemma3_12b --fp16

# ===================== Target Models ===================== #

llama2_7b:
  model_path: "./models/llama_2_7b_chat_hf_fp16"
  model_type: "llama2"
  chat_template: "llama-2"
  dtype: "float16"
  num_gpus: 2
  max_model_len: 2048
  gpu_memory_utilization: 0.7

